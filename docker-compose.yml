services:
  db:
    image: postgres:latest
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: backend
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 5433"
    volumes:
      - .:/app
    ports:
      - "5555:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_data:/usr/share/nginx/html
    ports:
      - "80:5554"
    depends_on:
      - api
    env_file:
      - .env

volumes:
  postgres_data:
  frontend_data:
